<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novas Casas - Bruno & Nova</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        header p {
            color: #666;
            font-size: 0.95rem;
        }

        .sync-status {
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #999;
        }

        .sync-status.saving { color: #e67e22; }
        .sync-status.saved { color: #27ae60; }
        .sync-status.error { color: #e74c3c; }

        .filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filters select, .filters input {
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            background: #fff;
        }

        .stats {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.85rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            cursor: pointer;
        }

        .card-img-placeholder {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .card-body { padding: 16px; }

        .card-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d6a4f;
            margin-bottom: 8px;
        }

        .card-price small {
            font-size: 0.75rem;
            font-weight: 400;
            color: #888;
        }

        .card-location {
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .card-location::before { content: "\U0001F4CD "; }

        .card-details {
            display: flex;
            gap: 14px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: #666;
            flex-wrap: wrap;
        }

        .card-details span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 12px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }

        .card-link a {
            color: #4361ee;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .card-link a:hover { text-decoration: underline; }

        /* Rating */
        .rating-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }

        .rating-section label {
            font-size: 0.8rem;
            color: #888;
            display: block;
            margin-bottom: 6px;
        }

        .stars {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
        }

        .star {
            font-size: 1.5rem;
            cursor: pointer;
            color: #ddd;
            transition: color 0.15s;
            user-select: none;
        }

        .star.active { color: #f4a261; }
        .star:hover { color: #e9c46a; }

        .rating-value {
            font-size: 0.8rem;
            color: #888;
            margin-left: 8px;
            align-self: center;
        }

        /* Comments */
        .comments-section { margin-top: 10px; }

        .comments-section label {
            font-size: 0.8rem;
            color: #888;
            display: block;
            margin-bottom: 6px;
        }

        .comment-input-row {
            display: flex;
            gap: 6px;
        }

        .comment-input-row input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .comment-input-row button {
            padding: 8px 14px;
            background: #4361ee;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .comment-input-row button:hover { background: #3a56d4; }

        .comment-author-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }

        .comment-author-row button {
            padding: 4px 12px;
            border: 2px solid #ddd;
            border-radius: 20px;
            background: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.15s;
        }

        .comment-author-row button.selected {
            border-color: #4361ee;
            background: #eef0ff;
            color: #4361ee;
        }

        .comments-list {
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .comment-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 0.85rem;
            gap: 8px;
        }

        .comment-item:last-child { border-bottom: none; }

        .comment-text {
            flex: 1;
            color: #444;
            line-height: 1.4;
        }

        .comment-author-tag {
            font-weight: 600;
            font-size: 0.75rem;
            padding: 1px 6px;
            border-radius: 4px;
            margin-right: 4px;
        }

        .comment-author-tag.bruno { background: #e3f2fd; color: #1565c0; }
        .comment-author-tag.nova { background: #fce4ec; color: #c62828; }

        .comment-date {
            font-size: 0.75rem;
            color: #bbb;
            white-space: nowrap;
        }

        .comment-delete {
            color: #ccc;
            cursor: pointer;
            font-size: 0.75rem;
            margin-left: 4px;
        }

        .comment-delete:hover { color: #e74c3c; }

        /* Status badge */
        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 2;
        }

        .status-favorita { background: #ffd700; color: #333; }
        .status-descartada { background: #ff6b6b; color: #fff; }
        .status-visitada { background: #51cf66; color: #fff; }

        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .card-actions button {
            padding: 4px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.15s;
        }

        .card-actions button:hover { background: #f8f8f8; }
        .card-actions button.active-fav { background: #fff8dc; border-color: #ffd700; }
        .card-actions button.active-desc { background: #ffe8e8; border-color: #ff6b6b; }
        .card-actions button.active-visit { background: #e8ffe8; border-color: #51cf66; }

        .card.descartada { opacity: 0.5; }

        /* Token modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal h2 {
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        .modal p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .modal input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .modal button {
            width: 100%;
            padding: 10px;
            background: #4361ee;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .modal button:hover { background: #3a56d4; }

        /* Config button */
        .config-btn {
            position: fixed;
            bottom: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid #ddd;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .config-btn:hover { background: #f8f8f8; }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Novas Casas</h1>
    <p>Bruno & Nova - Casas para alugar</p>
</header>

<div class="sync-status" id="syncStatus"></div>

<div class="filters">
    <select id="filterSort" onchange="renderCards()">
        <option value="date-desc">Mais recentes</option>
        <option value="date-asc">Mais antigas</option>
        <option value="price-asc">Menor preco</option>
        <option value="price-desc">Maior preco</option>
        <option value="rating-desc">Melhor nota</option>
    </select>
    <select id="filterStatus" onchange="renderCards()">
        <option value="all">Todas</option>
        <option value="none">Sem status</option>
        <option value="favorita">Favoritas</option>
        <option value="visitada">Visitadas</option>
        <option value="descartada">Descartadas</option>
    </select>
    <input type="text" id="filterSearch" placeholder="Buscar bairro..." oninput="renderCards()">
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<button class="config-btn" onclick="showTokenModal()" title="Configuracoes">&#9881;</button>

<script>
// ============================================================
// CASAS - Adicione novas casas aqui no topo do array
// ============================================================
const CASAS = [
    // {
    //     id: "casa-001",
    //     foto: "URL_DA_FOTO",
    //     preco: 3500,
    //     condominio: 500,
    //     endereco: "Rua Exemplo, 123 - Bairro, Cidade/SP",
    //     quartos: 3,
    //     banheiros: 2,
    //     vagas: 1,
    //     area: 85,
    //     mobiliada: false,
    //     aceita_pet: true,
    //     link: "URL_DO_ANUNCIO",
    //     data: "2026-03-24",
    //     obs: "Observacao inicial"
    // },
];

// ============================================================
// GitHub API - Shared data.json
// ============================================================
const REPO_OWNER = "BrunexT3";
const REPO_NAME = "novas-casas";
const DATA_FILE = "data.json";
const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FILE}`;

let sharedData = {};
let fileSha = null;
let saveTimeout = null;
let selectedAuthors = {}; // local-only, not saved to git

function getToken() {
    return localStorage.getItem("novas-casas-token") || "";
}

function setToken(token) {
    localStorage.setItem("novas-casas-token", token.trim());
}

function setSyncStatus(text, cls) {
    const el = document.getElementById("syncStatus");
    el.textContent = text;
    el.className = "sync-status " + (cls || "");
}

// Load data.json from GitHub
async function loadSharedData() {
    setSyncStatus("Carregando dados...", "saving");
    try {
        const token = getToken();
        const headers = { "Accept": "application/vnd.github.v3+json" };
        if (token) headers["Authorization"] = `token ${token}`;

        const resp = await fetch(API_BASE, { headers, cache: "no-store" });
        if (resp.status === 404) {
            // File doesn't exist yet - will be created on first save
            sharedData = {};
            fileSha = null;
            setSyncStatus("Pronto (sem dados ainda)", "saved");
            return;
        }
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const json = await resp.json();
        fileSha = json.sha;
        const content = atob(json.content.replace(/\n/g, ""));
        sharedData = JSON.parse(content);
        setSyncStatus("Dados carregados", "saved");
    } catch (err) {
        console.error("Load error:", err);
        if (!getToken()) {
            showTokenModal();
        } else {
            setSyncStatus("Erro ao carregar: " + err.message, "error");
        }
    }
}

// Save data.json to GitHub (debounced)
function scheduleSave() {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => saveSharedData(), 1500);
}

async function saveSharedData() {
    const token = getToken();
    if (!token) {
        showTokenModal();
        return;
    }

    setSyncStatus("Salvando...", "saving");
    try {
        // Re-read to get latest sha (avoid conflicts)
        const headers = {
            "Accept": "application/vnd.github.v3+json",
            "Authorization": `token ${token}`
        };

        const getResp = await fetch(API_BASE, { headers, cache: "no-store" });
        if (getResp.ok) {
            const current = await getResp.json();
            fileSha = current.sha;
        }

        const content = btoa(unescape(encodeURIComponent(JSON.stringify(sharedData, null, 2))));
        const body = {
            message: "update data",
            content: content,
        };
        if (fileSha) body.sha = fileSha;

        const putResp = await fetch(API_BASE, {
            method: "PUT",
            headers: {
                ...headers,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
        });

        if (!putResp.ok) {
            const errBody = await putResp.json();
            throw new Error(errBody.message || `HTTP ${putResp.status}`);
        }

        const result = await putResp.json();
        fileSha = result.content.sha;
        const now = new Date();
        setSyncStatus(`Salvo ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`, "saved");
    } catch (err) {
        console.error("Save error:", err);
        setSyncStatus("Erro ao salvar: " + err.message, "error");
    }
}

// ============================================================
// Data helpers (use sharedData instead of localStorage)
// ============================================================
function getCardData(id) {
    if (!sharedData[id]) sharedData[id] = { rating: 0, comments: [], status: "none" };
    return sharedData[id];
}

function setCardData(id, cardData) {
    sharedData[id] = cardData;
    scheduleSave();
}

// ============================================================
// Token modal
// ============================================================
function showTokenModal() {
    // Remove existing modal
    const existing = document.getElementById("tokenModal");
    if (existing) existing.remove();

    const modal = document.createElement("div");
    modal.id = "tokenModal";
    modal.className = "modal-overlay";
    modal.innerHTML = `
        <div class="modal">
            <h2>Configuracao</h2>
            <p>Cole o token do GitHub para salvar comentarios e notas de forma compartilhada.
            O token fica salvo apenas no seu navegador.</p>
            <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx" value="${getToken()}">
            <button onclick="saveToken()">Salvar</button>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById("tokenInput").focus();
}

async function saveToken() {
    const input = document.getElementById("tokenInput");
    setToken(input.value);
    document.getElementById("tokenModal").remove();
    await loadSharedData();
    renderCards();
}

// ============================================================
// Render
// ============================================================
function renderCards() {
    const grid = document.getElementById("grid");
    const sort = document.getElementById("filterSort").value;
    const statusFilter = document.getElementById("filterStatus").value;
    const search = document.getElementById("filterSearch").value.toLowerCase();

    let casas = [...CASAS];

    if (search) {
        casas = casas.filter(c => c.endereco.toLowerCase().includes(search));
    }
    if (statusFilter !== "all") {
        casas = casas.filter(c => {
            const d = getCardData(c.id);
            return (d.status || "none") === statusFilter;
        });
    }

    casas.sort((a, b) => {
        switch (sort) {
            case "date-desc": return b.data.localeCompare(a.data);
            case "date-asc": return a.data.localeCompare(b.data);
            case "price-asc": return a.preco - b.preco;
            case "price-desc": return b.preco - a.preco;
            case "rating-desc":
                return (getCardData(b.id).rating || 0) - (getCardData(a.id).rating || 0);
        }
    });

    const totalFav = CASAS.filter(c => (sharedData[c.id]?.status) === "favorita").length;
    document.getElementById("stats").textContent =
        `${CASAS.length} casa${CASAS.length !== 1 ? 's' : ''} | ${totalFav} favorita${totalFav !== 1 ? 's' : ''} | Mostrando ${casas.length}`;

    grid.innerHTML = casas.map(casa => {
        const d = getCardData(casa.id);
        const author = selectedAuthors[casa.id] || "bruno";

        const imgHtml = casa.foto
            ? `<img class="card-img" src="${casa.foto}" alt="Foto" onclick="window.open('${casa.link}','_blank')" onerror="this.outerHTML='<div class=card-img-placeholder>Sem foto</div>'">`
            : `<div class="card-img-placeholder">Sem foto</div>`;

        const statusBadge = d.status && d.status !== "none"
            ? `<span class="status-badge status-${d.status}">${d.status.charAt(0).toUpperCase() + d.status.slice(1)}</span>`
            : "";

        const stars = [1,2,3,4,5].map(i =>
            `<span class="star ${i <= d.rating ? 'active' : ''}" onclick="setRating('${casa.id}', ${i})">&#9733;</span>`
        ).join("");

        const comments = (d.comments || []).map((c, idx) =>
            `<div class="comment-item">
                <div class="comment-text">
                    <span class="comment-author-tag ${c.author || 'bruno'}">${(c.author || 'Bruno').charAt(0).toUpperCase() + (c.author || 'bruno').slice(1)}</span>
                    ${escapeHtml(c.text)}
                </div>
                <span class="comment-date">${c.date || ''}</span>
                <span class="comment-delete" onclick="deleteComment('${casa.id}', ${idx})">x</span>
            </div>`
        ).join("");

        const detailItems = [];
        if (casa.quartos) detailItems.push(`<span>${casa.quartos} quarto${casa.quartos > 1 ? 's' : ''}</span>`);
        if (casa.banheiros) detailItems.push(`<span>${casa.banheiros} banheiro${casa.banheiros > 1 ? 's' : ''}</span>`);
        if (casa.vagas !== undefined) detailItems.push(`<span>${casa.vagas} vaga${casa.vagas !== 1 ? 's' : ''}</span>`);
        if (casa.area) detailItems.push(`<span>${casa.area}m&sup2;</span>`);
        const tags = [];
        if (casa.mobiliada) tags.push("Mobiliada");
        if (casa.aceita_pet) tags.push("Aceita pet");

        const condText = casa.condominio ? ` <small>+ R$ ${casa.condominio.toLocaleString('pt-BR')} cond.</small>` : "";

        return `
        <div class="card${d.status === 'descartada' ? ' descartada' : ''}" id="card-${casa.id}">
            ${statusBadge}
            ${imgHtml}
            <div class="card-body">
                <div class="card-price">R$ ${casa.preco.toLocaleString('pt-BR')}${condText}</div>
                <div class="card-location">${escapeHtml(casa.endereco)}</div>
                <div class="card-details">
                    ${detailItems.join("")}
                    ${tags.map(t => `<span style="background:#f0f0f0;padding:2px 8px;border-radius:10px;font-size:0.78rem">${t}</span>`).join("")}
                </div>
                ${casa.obs ? `<div style="font-size:0.85rem;color:#666;margin-bottom:8px;font-style:italic">${escapeHtml(casa.obs)}</div>` : ""}
                <div class="card-meta">
                    <span>Adicionada em ${formatDate(casa.data)}</span>
                    <span class="card-link"><a href="${casa.link}" target="_blank">Ver anuncio</a></span>
                </div>

                <div class="card-actions">
                    <button class="${d.status === 'favorita' ? 'active-fav' : ''}" onclick="toggleStatus('${casa.id}','favorita')">&#9733; Favorita</button>
                    <button class="${d.status === 'visitada' ? 'active-visit' : ''}" onclick="toggleStatus('${casa.id}','visitada')">&#10003; Visitada</button>
                    <button class="${d.status === 'descartada' ? 'active-desc' : ''}" onclick="toggleStatus('${casa.id}','descartada')">&#10007; Descartada</button>
                </div>

                <div class="rating-section">
                    <label>Nota</label>
                    <div class="stars">
                        ${stars}
                        <span class="rating-value">${d.rating > 0 ? d.rating + '/5' : '-'}</span>
                    </div>
                </div>

                <div class="comments-section">
                    <label>Comentarios</label>
                    <div class="comment-author-row">
                        <button class="${author === 'bruno' ? 'selected' : ''}" onclick="selectAuthor('${casa.id}','bruno')">Bruno</button>
                        <button class="${author === 'nova' ? 'selected' : ''}" onclick="selectAuthor('${casa.id}','nova')">Nova</button>
                    </div>
                    <div class="comment-input-row">
                        <input type="text" id="input-${casa.id}" placeholder="Escrever comentario..." onkeydown="if(event.key==='Enter')addComment('${casa.id}')">
                        <button onclick="addComment('${casa.id}')">Enviar</button>
                    </div>
                    <div class="comments-list">${comments}</div>
                </div>
            </div>
        </div>`;
    }).join("");
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function formatDate(dateStr) {
    if (!dateStr) return "-";
    const [y, m, d] = dateStr.split("-");
    return `${d}/${m}/${y}`;
}

function setRating(id, rating) {
    const d = getCardData(id);
    d.rating = d.rating === rating ? 0 : rating;
    setCardData(id, d);
    renderCards();
}

function toggleStatus(id, status) {
    const d = getCardData(id);
    d.status = d.status === status ? "none" : status;
    setCardData(id, d);
    renderCards();
}

function selectAuthor(id, author) {
    selectedAuthors[id] = author;
    renderCards();
}

function addComment(id) {
    const input = document.getElementById(`input-${id}`);
    const text = input.value.trim();
    if (!text) return;
    const d = getCardData(id);
    if (!d.comments) d.comments = [];
    const now = new Date();
    const author = selectedAuthors[id] || "bruno";
    d.comments.push({
        text,
        author,
        date: `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`
    });
    setCardData(id, d);
    input.value = "";
    renderCards();
}

function deleteComment(id, idx) {
    const d = getCardData(id);
    d.comments.splice(idx, 1);
    setCardData(id, d);
    renderCards();
}

// ============================================================
// Init
// ============================================================
async function init() {
    await loadSharedData();
    renderCards();
}

init();
</script>

</body>
</html>
